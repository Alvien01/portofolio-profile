<div class="projects">
  <h2 data-aos="fade-up">My Projects</h2>
  <div class="projects-grid">
    @for (project of projects; track project.title; let i = $index) {
      <div class="project-item" data-aos="fade-up" [attr.data-aos-delay]="100 * (i % 3) + 100">
        <div class="index-badge">0{{ i + 1 }}</div>
        <div class="image-wrapper">
          <div class="image-container">
            <img [src]="project.images[0]" alt="{{ project.title }}">
            <div class="image-overlay">
              <button class="btn-explore" (click)="openModal(project)">
                <span>View Project</span>
                <i class="icon-arrow">&rarr;</i>
              </button>
            </div>
          </div>
          <div class="image-glow"></div>
        </div>
        <div class="item-content">
          <div class="content-header">
            <h3>{{ project.title }}</h3>
            <div class="line"></div>
          </div>
          <p>{{ project.description }}</p>
          <div class="tech-stack">
            <span *ngFor="let t of project.tech" class="tech-badge">{{ t }}</span>
          </div>
        </div>
      </div>
    }
  </div>
</div>

<!-- Modal -->
<div class="modal" *ngIf="selectedProject">
  <div class="modal-content">
    <span class="close" (click)="closeModal()">&times;</span>

    <h3>{{ selectedProject.title }}</h3>
    <p>{{ selectedProject.description }}</p>

    <div class="image-viewer">
      <button class="nav-btn left" (click)="prevImage()">&#10094;</button>
      <img
        [src]="selectedProject.images[currentImageIndex]"
        alt="{{ selectedProject.title }}"
      />
      <button class="nav-btn right" (click)="nextImage()">&#10095;</button>
    </div>
  </div>
</div>
