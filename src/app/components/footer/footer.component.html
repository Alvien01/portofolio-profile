<!-- Login Modal -->
<div class="modal-overlay" *ngIf="showModal" (click)="closeModal()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Login</h2>
      <button class="close-btn" (click)="closeModal()">
        <lucide-icon [name]="X"></lucide-icon>
      </button>
    </div>
    
    <form (ngSubmit)="handleLogin()">
      <div class="form-group">
        <label for="username">Username</label>
        <input 
          type="text" 
          id="username" 
          name="username"
          [(ngModel)]="username"
          required
          placeholder="Enter your username"
          class="form-control"
        />
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password"
          [(ngModel)]="password"
          required
          placeholder="Enter your password"
          class="form-control"
        />
      </div>
      
      <div class="modal-actions">
        <button type="button" class="btn-cancel" (click)="closeModal()">Cancel</button>
        <button type="submit" class="btn-submit">Login</button>
      </div>
    </form>
  </div>
</div>

<footer class="footer">
  <div class="footer-content">
    <div class="social-links">
      <a href="https://github.com/Alvien01" target="_blank" aria-label="GitHub">
        <lucide-icon [name]="Github"></lucide-icon>
      </a>
      <a href="https://www.linkedin.com/in/alfin-ardiansyah-93150a250/" target="_blank" aria-label="LinkedIn">
        <lucide-icon [name]="Linkedin"></lucide-icon>
      </a>
      <a href="https://instagram.com/" target="_blank" aria-label="Instagram">
        <lucide-icon [name]="Instagram"></lucide-icon>
      </a>
    </div>
    <p>&copy; 2026 Alfin Ardiansyah. Crafted with passion.</p>
    <button class="login-trigger-btn" (click)="openModal()">Login</button>
  </div>
</footer>
